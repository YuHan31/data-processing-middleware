# 服务器配置
server:
  port: 9999
  servlet:
    context-path: /

# 应用配置
spring:
  application:
    name: data-processing-middleware

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/middleware_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 12344321
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件存储路径配置
file:
  upload:
    path: ./uploads
  output:
    path: ./outputs

# 日志配置
logging:
  level:
    root: INFO
    com.middleware.org: DEBUG
  file:
    name: logs/application.log
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
